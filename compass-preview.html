<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业理念指南针</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 800px;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        .compass-image {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
        }
        .description {
            margin-top: 30px;
            color: #666;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>企业理念指南针</h1>
        <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=corporate%20philosophy%20compass%20diagram%20with%20multiple%20concentric%20circles%2C%20outer%20circle%20has%208%20concepts%20in%20Chinese%20%28品牌理念%2C%20人才理念%2C%20创新理念%2C%20风险理念%2C%20集团管控理念%2C%20质量理念%2C%20安全环保理念%2C%20服务理念%29%2C%20middle%20circle%20has%20经营方针%20and%20企业精神%2C%20inner%20circle%20has%20愿景%2C%20使命%2C%20核心价值观%2C%20center%20has%20blue%20compass%20needle%2C%20with%20directional%20markers%20%28N%2C%20S%2C%20E%2C%20W%29%2C%20blue%20and%20white%20color%20scheme%2C%20clean%20white%20background&image_size=square_hd" alt="企业理念指南针" class="compass-image">
        <div class="description">
            <h3>设计说明：</h3>
            <p>这是一款企业理念指南针设计，包含以下元素：</p>
            <ul style="text-align: left; margin: 20px auto; max-width: 600px;">
                <li>外圈：8个企业理念（品牌理念、人才理念、创新理念、风险理念、集团管控理念、质量理念、安全环保理念、服务理念）</li>
                <li>中圈：经营方针和企业精神</li>
                <li>内圈：愿景、使命、核心价值观</li>
                <li>中心：蓝色指南针指针</li>
                <li>方向标：N、S、E、W四个方向标记</li>
                <li>配色：蓝白配色方案，简洁专业</li>
            </ul>
            <p>此设计直观展示了企业的核心价值观和发展方向，如同指南针一样为企业的发展指引方向。</p>
        </div>
    </div>
</body>
</html>
